<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GGC Payroll Converter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #051630, #0a3175, #144ba6);
            min-height: 100vh;
            padding: 16px;
            display: flex;
            flex-direction: column;
        }

        .app-header {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            padding: 14px 22px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 16px;
        }

        .logos {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logos img {
            height: 45px;
            object-fit: contain;
        }

        .app-header h1 {
            color: #fff;
            font-size: 20px;
            font-weight: 700;
            margin-left: 5px;
        }

        .app-header h1 span {
            color: #e61c24;
        }

        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 9px 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-upload {
            background: #2e7d32;
            color: #fff;
        }

        .btn-back {
            background: #263238;
            color: #fff;
        }

        .btn-back:hover {
            background: #1b2327;
            transform: translateY(-1px);
        }

        .btn-upload:hover {
            background: #1b5e20;
            transform: translateY(-1px);
        }

        .btn-download {
            background: #1565c0;
            color: #fff;
        }

        .btn-download:hover:not(:disabled) {
            background: #0d47a1;
            transform: translateY(-1px);
        }

        .btn-download:disabled {
            background: #455a64;
            color: #90a4ae;
            cursor: not-allowed;
        }

        #fileInput {
            display: none;
        }

        .workspace {
            display: flex;
            flex-direction: column;
            flex: 1;
            border: 2px dashed rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            transition: all 0.3s ease;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.03);
            position: relative;
        }

        .file-meta {
            border-bottom: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 12px;
            display: none;
            align-items: center;
            gap: 8px;
            min-height: 40px;
        }

        .file-meta.visible {
            display: flex;
        }

        .file-chip {
            max-width: 100%;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 5px 10px;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.2);
            font-size: 12px;
            color: rgba(255, 255, 255, 0.88);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .file-chip.empty {
            color: rgba(255, 255, 255, 0.55);
            border-style: dashed;
        }

        .workspace.drag-active {
            border-color: #e61c24;
            background: rgba(230, 28, 36, 0.1);
        }

        .workspace.has-preview {
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .preview-scroll {
            flex: 1;
            overflow: auto;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            height: 100%;
        }

        .empty-state {
            margin: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.6);
            text-align: center;
            gap: 16px;
            pointer-events: none;
            width: 100%;
            height: 100%;
        }

        .upload-icon {
            font-size: 64px;
            opacity: 0.8;
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.3));
        }

        .empty-state h2 {
            font-weight: 600;
            color: #fff;
            font-size: 20px;
            letter-spacing: 0.5px;
        }

        .empty-state p {
            font-size: 14px;
        }

        .app-footer {
            margin-top: 16px;
            text-align: center;
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            line-height: 1.5;
        }

        .app-footer span {
            color: #e61c24;
            font-weight: 500;
        }

        ::-webkit-scrollbar {
            width: 5px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.18);
            border-radius: 3px;
        }

        /* ═══ PAYSLIP ═══ */
        .payslip {
            width: 820px;
            background: #fff;
            border: 1.5px solid #000;
            font-family: 'Courier New', Courier, monospace;
            font-size: 8.5px;
            color: #000;
            padding: 7px 9px;
            line-height: 1.3;
        }

        .ps-title {
            text-align: center;
            font-size: 14px;
            font-weight: bold;
            border-bottom: 1.5px solid #000;
            padding-bottom: 3px;
            margin-bottom: 3px;
            letter-spacing: 1.5px;
        }

        .ps-top {
            width: 100%;
            border-collapse: collapse;
            font-size: 8.5px;
            margin-bottom: 3px;
        }

        .ps-top td {
            padding: 1px 3px;
            vertical-align: top;
        }

        .lbl {
            font-weight: bold;
            white-space: nowrap;
        }

        .ps-ids {
            width: 100%;
            border-collapse: collapse;
            font-size: 8px;
            border-top: 0.5px solid #000;
            border-bottom: 0.5px solid #000;
            margin-bottom: 3px;
        }

        .ps-ids td {
            padding: 2px 3px;
        }

        .ps-rate {
            width: 100%;
            border-collapse: collapse;
            font-size: 8.5px;
            border-bottom: 0.5px solid #000;
            margin-bottom: 4px;
        }

        .ps-rate td {
            padding: 2px 3px;
        }

        .ps-body {
            width: 100%;
            border-collapse: collapse;
            border: 1px solid #000;
            font-size: 8px;
        }

        .ps-body th {
            background: #e0e0e0;
            font-weight: bold;
            text-align: center;
            border: 0.5px solid #000;
            padding: 2px 3px;
            font-size: 8px;
        }

        .ps-body td {
            border: 0.5px solid #000;
            vertical-align: top;
            padding: 0;
        }

        .inner {
            width: 100%;
            border-collapse: collapse;
        }

        .inner td {
            padding: 1px 3px;
            border-bottom: 0.5px dotted #ccc;
            font-size: 8px;
        }

        .inner tr:last-child td {
            border-bottom: none;
        }

        .inner .r {
            text-align: right;
        }

        .inner .hdr {
            font-weight: bold;
            font-size: 7.5px;
            background: #f5f5f5;
            border-bottom: 0.5px solid #000 !important;
        }

        .inner .total {
            font-weight: bold;
            background: #eeeeee;
            border-top: 1px solid #000 !important;
            border-bottom: none !important;
        }

        .net-box {
            border: 1.5px solid #000;
            margin: 5px 3px 3px 3px;
            padding: 4px;
            text-align: center;
        }

        .net-label {
            font-weight: bold;
            font-size: 8px;
        }

        .net-amt {
            font-size: 15px;
            font-weight: bold;
            margin-top: 3px;
        }

        @media print {
            body {
                background: white;
                padding: 0;
            }

            .app-header,
            .workspace,
            .app-footer {
                display: none;
            }
        }
    </style>
</head>

<body>

    <div class="app-header">
        <div class="logos">
            <img src="asset/ggclogo.png" alt="GGC Logo">
            <img src="asset/EVSU_Official_Logo.png" alt="EVSU Logo">
            <h1>🧾 GGC <span>Payroll</span> Converter</h1>
        </div>
        <div class="controls">
            <button class="btn btn-back" onclick="goBack()">← Back to Landing Page</button>
            <button class="btn btn-upload" onclick="triggerUpload()">📤 Upload New File</button>
            <button class="btn btn-download" id="downloadBtn" onclick="downloadAll()" disabled>💾 Download All
                Payslips</button>
        </div>
        <input type="file" id="fileInput" accept=".htm,.html" onchange="handleUpload(event)">
    </div>

    <div class="workspace" id="dropZone">
        <div class="file-meta">
            <div class="file-chip empty" id="fileNameDisplay">No file selected</div>
        </div>
        <div class="preview-scroll" id="previewArea">
            <div class="empty-state">
                <div class="upload-icon">📄</div>
                <h2>Drag & Drop your .htm file here</h2>
                <p>or click the upload button above to browse</p>
                <div style="font-size:12px; opacity:0.6; margin-top:20px;">Supports multi-employee batch conversion
                </div>
            </div>
        </div>
    </div>

    <footer class="app-footer">
        Created by interns of <span>EVSU</span>: Klenth Joeseph D. Cañedo, Abdullah Adel Rante, Jerson Jr L. Donasco,
        and Christian Gatela
    </footer>

    <script>
        'use strict';

        let allEmployees = [];
        let currentIdx = 0;

        function goBack() { window.location.href = 'index.html'; }

        function triggerUpload() { document.getElementById('fileInput').click(); }

        function setFileName(name) {
            const el = document.getElementById('fileNameDisplay');
            if (!name) {
                el.textContent = 'No file selected';
                el.classList.add('empty');
                return;
            }
            el.textContent = name;
            el.classList.remove('empty');
        }

        function showFileMeta(name) {
            setFileName(name);
            document.querySelector('.file-meta').classList.add('visible');
        }

        function hideFileMeta() {
            setFileName('');
            document.querySelector('.file-meta').classList.remove('visible');
        }

        function handleUpload(e) {
            const file = e.target.files[0];
            if (!file) return;
            document.getElementById('dropZone').classList.remove('drag-active');
            hideFileMeta();

            const reader = new FileReader();
            reader.onload = ev => {
                allEmployees = parseHTM(ev.target.result);

                if (allEmployees.length > 0) {
                    showFileMeta(file.name);
                    document.getElementById('dropZone').classList.add('has-preview');
                    document.getElementById('previewArea').innerHTML = buildPayslip(allEmployees[0]);
                    document.getElementById('downloadBtn').disabled = false;
                } else {
                    hideFileMeta();
                    document.getElementById('previewArea').innerHTML = `
                        <div class="empty-state">
                            <div class="upload-icon" style="font-size:40px;">⚠️</div>
                            <h2>No valid data found in this file</h2>
                            <p>Please upload a valid payroll .htm file.</p>
                        </div>`;
                }
            };
            reader.readAsText(file, 'windows-1252');

            // Reset file input value so that the exact same file can be uploaded again immediately
            document.getElementById('fileInput').value = '';
        }

        /* ═══════════════════════════════════════════════════════════
           DRAG AND DROP HANDLERS
           ═══════════════════════════════════════════════════════════ */
        const dropZone = document.getElementById('dropZone');

        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, preventDefaults, false);
            document.body.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, highlight, false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, unhighlight, false);
        });

        function highlight(e) {
            dropZone.classList.add('drag-active');
        }

        function unhighlight(e) {
            dropZone.classList.remove('drag-active');
        }

        dropZone.addEventListener('drop', handleDrop, false);

        function handleDrop(e) {
            const dt = e.dataTransfer;
            const files = dt.files;
            if (files.length) {
                document.getElementById('fileInput').files = files;
                handleUpload({ target: { files: files } });
            }
        }

        /* ═══════════════════════════════════════════════════════════
           PARSE: Split the single flat TABLE into per-employee blocks.
           Each block starts at a <B>NAME</B> occurrence in the HTML.
           ═══════════════════════════════════════════════════════════ */
        function parseHTM(raw) {
            const anchors = [];
            const rx = /<B>NAME<\/B>/gi;
            let m;
            while ((m = rx.exec(raw)) !== null) anchors.push(m.index);
            if (anchors.length === 0) return [parseBlock(raw)].filter(Boolean);
            return anchors
                .map((start, i) => raw.slice(start, anchors[i + 1] || raw.length))
                .map(parseBlock)
                .filter(Boolean);
        }

        /* ═══════════════════════════════════════════════════════════
           HELPERS
           ═══════════════════════════════════════════════════════════ */

        /** Strip HTML tags and collapse whitespace. */
        function st(s) { return (s || '').replace(/<[^>]+>/g, '').replace(/&nbsp;/g, ' ').replace(/\s+/g, ' ').trim(); }

        /** First match value (last capture group). */
        function grab(block, rx) {
            const m = block.match(rx);
            return m ? st(m[m.length - 1]) : '';
        }

        /**
         * For labels that appear on one TR and whose value is on the NEXT TR:
         *   Find labelRx in block → find next </TR> → find the following </TR>
         *   Return first ALIGN=RIGHT number in that row.
         */
        function grabNextRow(block, labelRx) {
            const pos = block.search(labelRx);
            if (pos < 0) return '';
            const trEnd1 = block.indexOf('</TR>', pos);
            if (trEnd1 < 0) return '';
            const rowStart = trEnd1 + 5;
            const trEnd2 = block.indexOf('</TR>', rowStart);
            if (trEnd2 < 0) return '';
            const tr = block.slice(rowStart, trEnd2);
            const m = tr.match(/ALIGN=RIGHT[^>]*>(-?[\d,]+\.[\d]{2})<\/DIV>/i);
            return m ? m[1] : '';
        }

        /**
         * For deductions: the label appears on one TR; the amount cell is
         * in the SAME row (not the next) — it appears to the right in the
         * same <TR> and is the FIRST ALIGN=RIGHT after the label text.
         */
        function grabSameRow(block, labelRx) {
            const pos = block.search(labelRx);
            if (pos < 0) return '';
            const trEnd = block.indexOf('</TR>', pos);
            if (trEnd < 0) return '';
            const tr = block.slice(pos, trEnd);
            const m = tr.match(/ALIGN=RIGHT[^>]*>(-?[\d,]+\.[\d]{2})<\/DIV>/i);
            return m ? m[1] : '';
        }

        function grabLoanRow(block, labelRx) {
            const pos = block.search(labelRx);
            if (pos < 0) return { pay: '', pmt: '', bal: '' };
            
            // Look up to 1500 characters to make sure we cover all nested tags
            let chunk = block.slice(pos, pos + 1500); 
            
            // Try formatting with ALIGN=RIGHT in the first row
            let tr1End = chunk.indexOf('</TR>');
            if (tr1End > 0) {
                let tr1 = chunk.slice(0, tr1End);
                let alignNums = [...tr1.matchAll(/ALIGN=RIGHT[^>]*>.*?(-?[\d,]+\.\d{2})<\/DIV>/gi)];
                if (alignNums.length > 0) {
                    return {
                        pay: alignNums[0] ? alignNums[0][1] : '',
                        pmt: alignNums[1] ? alignNums[1][1] : '',
                        bal: alignNums[2] ? alignNums[2][1] : ''
                    };
                }
                
                // If no ALIGN=RIGHT, try the next row
                let tr2Start = tr1End + 1;
                let tr2End = chunk.indexOf('</TR>', tr2Start);
                if (tr2End > tr2Start) {
                    let tr2 = chunk.slice(tr2Start, tr2End);
                    let alignNums2 = [...tr2.matchAll(/ALIGN=RIGHT[^>]*>.*?(-?[\d,]+\.\d{2})<\/DIV>/gi)];
                    if (alignNums2.length > 0) {
                        return {
                            pay: alignNums2[0] ? alignNums2[0][1] : '',
                            pmt: alignNums2[1] ? alignNums2[1][1] : '',
                            bal: alignNums2[2] ? alignNums2[2][1] : ''
                        };
                    }
                }
            }
            
            // Ultimate fallback: Just scan up to the next label and take ALL decimals
            let sub = chunk.slice(10);
            let nextLabelOffset = sub.search(/HDMF[\s\-]H\b|HDMF[\s\-]S\b|SSS[\s\-]S\b|SSS[\s\-]C\b|TOTAL|<\/TABLE>/i);
            if (nextLabelOffset > 0) {
                chunk = chunk.slice(0, nextLabelOffset + 10);
            }
            let clean = chunk.replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim();
            let flatNums = [...clean.matchAll(/-?[\d,]+\.\d{2}/g)];
            return {
                pay: flatNums[0] ? flatNums[0][0] : '',
                pmt: flatNums[1] ? flatNums[1][0] : '',
                bal: flatNums[2] ? flatNums[2][0] : ''
            };
        }

        /* ═══════════════════════════════════════════════════════════
           PARSE ONE EMPLOYEE BLOCK
           ═══════════════════════════════════════════════════════════ */
        function parseBlock(block) {
            // ── Name ──
            const nameM = block.match(/<B>NAME<\/B>[\s\S]{0,300}?<B>([A-Z][A-Z ,.\-']+)<\/B>/i);
            const name = nameM ? nameM[1].trim() : '';
            if (!name) return null;

            // ── IDNO ──
            const idM = block.match(/<B>IDNO\s*#<\/B>[\s\S]{0,400}?<B>(\d{4,8})<\/B>/i);
            const idNo = idM ? idM[1] : '';

            // ── DIV-DEPT (first bold code after DIV-DEPT label) ──
            const deptM = block.match(/<B>DIV-DEPT<\/B>[\s\S]{0,600}?<B>([A-Z0-9\-]+)<\/B>/i);
            const divDept = deptM ? deptM[1] : '';

            // ── Second SERV code ──
            const servAll = [...block.matchAll(/<B>(SERV\d+)<\/B>/gi)];
            const serv2 = servAll.length > 1 ? servAll[1][1] : (servAll[0] ? servAll[0][1] : '');

            // ── Period number ──
            const periodNumM = block.match(/<B>PERIOD<\/B>[\s\S]{0,500}?<B>(\d{6})<\/B>/i);
            const periodNum = periodNumM ? periodNumM[1] : '';

            // ── Period date range ──
            const periodDateM = block.match(/<B>(\d{2}\/\d{2}\/\d{4}\s*-\s*\d{2}\/\d{2}\/\d{4})<\/B>/i);
            const periodDate = periodDateM ? periodDateM[1] : '';

            // ── Date stamp ──
            const dsM = block.match(/ALIGN=RIGHT>((?:Monday|Tuesday|Wednesday|Thursday|Friday|Saturday|Sunday)[^<]+)<\/DIV>/i);
            const dateStamp = dsM ? dsM[1].trim() : '';

            // ── TIN ──  (first plain number after "# :" in TIN section)
            const tinM = block.match(/\bTIN\b[\s\S]{0,500}?<FONT[^>]*>(\d{7,12})<\/FONT>/i);
            const tinNum = tinM ? tinM[1] : '';

            // ── SSS ──
            const sssM = block.match(/\bSSS\b[\s\S]{0,500}?COLSPAN=10[^>]*>[^<]*<FONT[^>]*>(\d{9,12})<\/FONT>/i);
            const sssNum = sssM ? sssM[1] : '';

            // ── PHTH ──
            const phthM = block.match(/\bPHTH\b[\s\S]{0,500}?COLSPAN=10[^>]*>[^<]*<FONT[^>]*>(\d{11,13})<\/FONT>/i);
            const phthNum = phthM ? phthM[1] : '';

            // ── HDMF ──
            const hdmfM = block.match(/\bHDMF\b[\s\S]{0,500}?COLSPAN=10[^>]*>[^<]*<FONT[^>]*>(\d{11,13})<\/FONT>/i);
            const hdmfNum = hdmfM ? hdmfM[1] : '';

            // ── RATE — plain text on the NEXT TR (same structure as ACCT# & TAXCODE) ──
            const rate = (function () {
                const pos = block.search(/\bRATE\b/i);
                if (pos < 0) return '';
                const tr1End = block.indexOf('</TR>', pos);
                if (tr1End < 0) return '';
                const tr2Start = tr1End + 5;
                const tr2End = block.indexOf('</TR>', tr2Start);
                if (tr2End < 0) return '';
                const tr = block.slice(tr2Start, tr2End);
                const m = tr.match(/<FONT[^>]*>([\d,]+\.\d{2})<\/FONT>/i);
                return m ? m[1] : '';
            })();

            // ── ACCT# — value is plain text on the NEXT TR after the <B>ACCT#</B> label ──
            const acct = (function () {
                const pos = block.search(/\bACCT#/i);
                if (pos < 0) return '';
                const tr1End = block.indexOf('</TR>', pos);
                if (tr1End < 0) return '';
                const tr2Start = tr1End + 5;
                const tr2End = block.indexOf('</TR>', tr2Start);
                if (tr2End < 0) return '';
                const tr = block.slice(tr2Start, tr2End);
                // Value is in a plain <FONT> tag (no ALIGN=RIGHT), just digits
                const m = tr.match(/<FONT[^>]*>(\d{7,14})<\/FONT>/i);
                return m ? m[1] : '';
            })();

            // ── TAXCODE — plain text on the NEXT TR after the label (same structure as ACCT#) ──
            const taxCode = (function () {
                const pos = block.search(/TAXCODE:/i);
                if (pos < 0) return '';
                const tr1End = block.indexOf('</TR>', pos);
                if (tr1End < 0) return '';
                const tr2Start = tr1End + 5;
                const tr2End = block.indexOf('</TR>', tr2Start);
                if (tr2End < 0) return '';
                const tr = block.slice(tr2Start, tr2End);
                const m = tr.match(/<FONT[^>]*>([A-Z0-9][A-Z0-9\-]{0,10})<\/FONT>/i);
                return m ? m[1] : '';
            })();

            /* ─────────────────────────────────────────────────────
               LABOR ITEMS
               Structure in the HTM:
                 Row N:   >REGPAY</FONT></TD></TR>
                 Row N+1: ...ALIGN=RIGHT>80.00</DIV>...ALIGN=RIGHT>4,520.00</DIV>...
               So after finding the label we skip to the NEXT </TR>,
               then grab the first two ALIGN=RIGHT numbers in the row AFTER that.
               ───────────────────────────────────────────────────── */
            const LABOR_LABELS = [
                'REGPAY', 'ABSENT', 'REGOT', 'REGNP', 'REGNPOT',
                'LEGAL', 'LEGOT', 'LEGNP', 'LEGNPOT',
                'SPECIAL', 'SPLOT', 'SPCLNP', 'SPCLNPOT',
                'RESTDAY', 'RSTOT', 'RSTNP', 'RSTNPOT',
                'RSTLEG', 'RSTLEGOT', 'RSTLEGNP', 'RSTLEGNPOT',
                'RSTSPL', 'RSTSPLOT', 'RSTSPLNP', 'RSTSPLNPOT'
            ];

            const laborItems = LABOR_LABELS.map(lbl => {
                const pos = block.search(new RegExp('>' + lbl + '<\\/FONT>', 'i'));
                if (pos < 0) return { lbl, hrs: '', amt: '' };

                // end of the label's TR
                const tr1End = block.indexOf('</TR>', pos);
                if (tr1End < 0) return { lbl, hrs: '', amt: '' };

                // start of next TR
                const tr2Start = tr1End + 5;
                const tr2End = block.indexOf('</TR>', tr2Start);
                if (tr2End < 0) return { lbl, hrs: '', amt: '' };

                // Limit TR to first ~400 chars — labor column HRS/AMT appear early (left side).
                // Right-side COLA/13TH values appear later in the same TR (due to ROWSPAN layout).
                const trWide = block.slice(tr2Start, tr2End);
                const tr = trWide.slice(0, Math.min(trWide.length, 400));

                const nums = [...tr.matchAll(/ALIGN=RIGHT[^>]*>(-?[\d,]+\.[\d]{2})<\/DIV>/gi)];
                return {
                    lbl,
                    hrs: nums[0] ? nums[0][1] : '',
                    amt: nums[1] ? nums[1][1] : ''
                };
            });

            /* ─────────────────────────────────────────────────────
               TOTALS & ALLOWANCES  (same TR-skip pattern)
               ───────────────────────────────────────────────────── */
            const totalA = grabNextRow(block, /TOTAL\s*-\s*A\s*=/i);
            // ADDBACK, COLA, 13TH — label + value are in the SAME <TR>
            const addback = grabSameRow(block, /ADDBACK/i);
            const totalB = grabNextRow(block, /TOTAL\s*-\s*B\s*=/i);
            const cola = grabSameRow(block, /\bCOLA\b/i);
            const thirteenth = grabSameRow(block, /\b13TH\b/i);
            const totalC = grabNextRow(block, /TOTAL\s*-\s*C\s*=/i);

            /* ─────────────────────────────────────────────────────
               DEDUCTIONS
               Each deduction label is on one TR; its ALIGN=RIGHT value
               is on the NEXT TR (same pattern as labor items / totals).
               ───────────────────────────────────────────────────── */
            const sssPrem = grabNextRow(block, /SSS\s*PREMIUM/i);
            const phthPrem = grabNextRow(block, /PHEALTH\s*PREMIUM/i);
            const hdmfPrem = grabNextRow(block, /HDMF\s*PREMIUM/i);
            const taxWith = grabNextRow(block, /TAX\s*WITHHELD/i);
            const sssSalLoan = grabNextRow(block, /SSS\s*SAL[\s\-]?LOAN/i);
            const sssCalLoan = grabNextRow(block, /SSS\s*CAL[\s\-]?LOAN/i);
            const hdmfSalLoan = grabNextRow(block, /HDMF\s*SAL[\s\-]?LOAN/i);
            const hdmfHouLoan = grabNextRow(block, /HDMF\s*HOU[\s\-]?LOAN/i);
            const compLoan = grabNextRow(block, /COMP\s*REG[\s\-]?LOAN/i);
            const compOthLoan = grabNextRow(block, /COMP\s*OTH[\s\-]?LOAN/i);
            const multiOther = grabNextRow(block, /MULTIPLE\s*OTHER/i);
            const sharedBen = grabNextRow(block, /SHARED\s*BENEFITS/i);
            const salaryAdv = grabNextRow(block, /SALARY\s*ADVANCES/i);
            const totalD = grabSameRow(block, /TOTAL\s*-\s*D\s*=/i);

            /* ─────────────────────────────────────────────────────
               LEAVE BALANCES
               VL, SL, DOC appear as labels; their numbers are to the
               right in the same row.
               ───────────────────────────────────────────────────── */
            const vlBal = grabSameRow(block, /\bVL\b/i);
            const slBal = grabSameRow(block, /\bSL\b/i);
            const docBal = grabSameRow(block, /\bDOC\b/i);

            /* ─────────────────────────────────────────────────────
               NET PAY
               The net is printed with Courier New SIZE=3 CENTER tags:
                 <FONT FACE="Courier New" SIZE=3><B><CENTER>4,869.11</CENTER>
               ───────────────────────────────────────────────────── */
            const netM = block.match(/A\+B\+C-D[\s\S]{0,3000}?<FONT[^>]*Courier[^>]*>[\s\S]{0,60}?<CENTER>(-?[\d,]+\.[\d]{2})<\/CENTER>/i);
            const netPay = netM ? netM[1] : '';

            /* ─────────────────────────────────────────────────────
               LOAN PAYMENTS
               ───────────────────────────────────────────────────── */
            const hdmfH = grabLoanRow(block, /HDMF[\s\-]H\b/i);
            const hdmfS = grabLoanRow(block, /HDMF[\s\-]S\b/i);
            const sssS = grabLoanRow(block, /SSS[\s\-]S\b/i);
            const sssC = grabLoanRow(block, /SSS[\s\-]C\b/i);

            return {
                name, idNo, divDept, serv2,
                periodNum, periodDate, dateStamp,
                tinNum, sssNum, phthNum, hdmfNum,
                rate, acct, taxCode,
                laborItems,
                totalA, addback, totalB,
                cola, thirteenth, totalC,
                sssPrem, phthPrem, hdmfPrem, taxWith,
                sssSalLoan, sssCalLoan, hdmfSalLoan, hdmfHouLoan,
                compLoan, compOthLoan, multiOther, sharedBen, salaryAdv, totalD,
                vlBal, slBal, docBal,
                netPay,
                hdmfH, hdmfS, sssS, sssC
            };
        }

        /* ═══════════════════════════════════════════════════════════
           UI helpers
           ═══════════════════════════════════════════════════════════ */

        /* ═══════════════════════════════════════════════════════════
           DOWNLOAD ALL as a single paginated HTML file
           ═══════════════════════════════════════════════════════════ */
        function downloadAll() {
            if (!allEmployees.length) { alert('No data to download.'); return; }
            const style = Array.from(document.querySelectorAll('style')).map(s => s.innerHTML).join('\n');
            const pages = allEmployees.map((emp, i) =>
                `<div${i > 0 ? ' style="page-break-before:always;"' : ''}>${buildPayslip(emp)}</div>`
            ).join('\n');
            const html = `<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<title>GGC Payslips – All Employees</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#f5f5f5;padding:20px;}
@page{size:landscape;margin:8mm;}
@media print{body{background:white;padding:0;}}
${style}
.payslip{margin-bottom:20px;}
</style></head><body>${pages}</body></html>`;
            const blob = new Blob([html], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `GGC_Payslips_${new Date().toISOString().slice(0, 10)}.html`;
            document.body.appendChild(a); a.click();
            document.body.removeChild(a); URL.revokeObjectURL(url);
        }
    </script>
